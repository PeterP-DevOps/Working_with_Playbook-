---
- name: Install Clickhouse
  hosts: clickhouse
  become: true

  vars:
    clickhouse_version: "22.3.3.44"
    clickhouse_rpms:
      - clickhouse-common-static-{{ clickhouse_version }}.x86_64.rpm
      - clickhouse-client-{{ clickhouse_version }}.noarch.rpm
      - clickhouse-server-{{ clickhouse_version }}.noarch.rpm

  tasks:
    - name: Download Clickhouse packages
      ansible.builtin.get_url:
        url: "https://packages.clickhouse.com/rpm/stable/{{ item }}"
        dest: "/tmp/{{ item }}"
        mode: "0644"
      loop: "{{ clickhouse_rpms }}"

    - name: Check Clickhouse binary
      ansible.builtin.stat:
        path: /usr/bin/clickhouse
      register: clickhouse_binary

    - name: Install Clickhouse packages
      ansible.builtin.command: >
        rpm -Uvh --nosignature
        /tmp/clickhouse-common-static-{{ clickhouse_version }}.x86_64.rpm
        /tmp/clickhouse-client-{{ clickhouse_version }}.noarch.rpm
        /tmp/clickhouse-server-{{ clickhouse_version }}.noarch.rpm
      when: not clickhouse_binary.stat.exists
      changed_when: true

    - name: Ensure Clickhouse service is running
      ansible.builtin.service:
        name: clickhouse-server
        state: started
        enabled: true


- name: Install Vector
  hosts: vector
  become: true

  vars:
    vector_version: "0.34.0"
    vector_rpm: "vector-{{ vector_version }}-1.x86_64.rpm"
    vector_url: "https://github.com/vectordotdev/vector/releases/download/v{{ vector_version }}/{{ vector_rpm }}"
    clickhouse_host: "{{ hostvars[groups['clickhouse'][0]].ansible_host | default(groups['clickhouse'][0]) }}"
    clickhouse_database: "logs"
    clickhouse_table: "vector_logs"

  handlers:
    - name: restart vector
      ansible.builtin.service:
        name: vector
        state: restarted

  tasks:
    - name: Download Vector package
      ansible.builtin.get_url:
        url: "{{ vector_url }}"
        dest: "/tmp/{{ vector_rpm }}"
        mode: "0644"

    - name: Check Vector binary
      ansible.builtin.stat:
        path: /usr/bin/vector
      register: vector_binary

    - name: Install Vector package
      ansible.builtin.command: >
        rpm -Uvh --nosignature /tmp/{{ vector_rpm }}
      when: not vector_binary.stat.exists
      changed_when: true

    - name: Deploy Vector config
      ansible.builtin.template:
        src: vector.toml.j2
        dest: /etc/vector/vector.toml
        mode: "0644"
      notify: restart vector

    - name: Ensure Vector service is running
      ansible.builtin.service:
        name: vector
        state: started
        enabled: true