---
- name: Create Vector directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ vector_home }}"
    - "{{ vector_config_dir }}"

- name: Download Vector
  ansible.builtin.get_url:
    url: "https://packages.timber.io/vector/{{ vector_version }}/vector-{{ vector_version }}-{{ vector_arch }}-unknown-linux-gnu.tar.gz"
    dest: /tmp/vector.tar.gz
    mode: "0644"

- name: Unpack Vector
  ansible.builtin.unarchive:
    src: /tmp/vector.tar.gz
    dest: "{{ vector_home }}"
    remote_src: true
    extra_opts:
      - --strip-components=2

- name: Create Vector symlink
  ansible.builtin.file:
    src: "{{ vector_home }}/bin/vector"
    dest: /usr/local/bin/vector
    state: link

- name: Deploy Vector config
  ansible.builtin.template:
    src: vector.toml.j2
    dest: "{{ vector_config_dir }}/vector.toml"
    mode: "0644"
  notify: Restart Vector

- name: Create Vector service
  ansible.builtin.copy:
    dest: /etc/systemd/system/vector.service
    mode: "0644"
    content: |
      [Unit]
      Description=Vector Service
      After=network.target

      [Service]
      Type=simple
      ExecStart=/usr/local/bin/vector --config /etc/vector/vector.toml
      Restart=always

      [Install]
      WantedBy=multi-user.target
  notify: Restart Vector

- name: Enable Vector service
  ansible.builtin.systemd:
    name: vector
    enabled: true
    daemon_reload: true
    state: started